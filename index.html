const resizePhoto = (file, maxDim = 160, quality = 0.85) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      let w = img.width,
        h = img.height;
      if (w > h) {
        if (w > maxDim) {
          h = Math.round(h * maxDim / w);
          w = maxDim;
        }
      } else {
        if (h > maxDim) {
          w = Math.round(w * maxDim / h);
          h = maxDim;
        }
      }
      const canvas = document.createElement("canvas");
      canvas.width = w;
      canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL("image/jpeg", quality));
    };
    img.onerror = () => reject(new Error("No se pudo leer la imagen"));
    img.src = e.target.result;
  };
  reader.onerror = () => reject(new Error("No se pudo leer el archivo"));
  reader.readAsDataURL(file);
});

const parseVal = v => {
  if (typeof v === "number" && v >= 1 && v <= 8) return Math.round(v);
  if (typeof v === "string") {
    const t = v.trim();
    if (VMAP[t]) return VMAP[t];
    const n = parseFloat(t);
    if (!isNaN(n) && n >= 1 && n <= 8) return Math.round(n);
  }
  return 4;
};
function parseExcelModule(ab, fileName) {
  const wb = XLSX.read(new Uint8Array(ab), {
    type: "array"
  });
  const sn = wb.SheetNames.find(n => /matriz|conocimiento/i.test(n)) || wb.SheetNames[0];
  const rows = XLSX.utils.sheet_to_json(wb.Sheets[sn], {
    header: 1,
    defval: ""
  });
  const items = [];
  let uid = Date.now();
  for (const row of rows) {
    const peso = parseFloat(row[0]);
    if (!peso || peso <= 0 || isNaN(peso)) continue;
    const desc = String(row[1] || "").trim(),
      ambito = String(row[2] || "").trim();
    if (!desc || !ambito || desc.length < 4) continue;
    if (/^(valoraci|desviaci|nivel)/i.test(desc)) continue;
    items.push({
      id: uid++,
      peso,
      desc,
      ambito,
      v1: parseVal(row[3]),
      v2: parseVal(row[4])
    });
  }
  const name = sn.replace(/conocimiento[\s_]*/i, "").replace(/[\s_]*matriz[\s_]*/i, " ").replace(/[\s_]+/g, " ").trim() || fileName.replace(/\.(xlsx?|xls)$/i, "");
  return {
    id: "mod-" + Date.now(),
    name: name || "Módulo importado",
    items,
    ambitoOrder: [...new Set(items.map(i => i.ambito))]
  };
}
const excelDateToISO = v => {
  if (v == null || v === "") return "";
  if (v instanceof Date) {
    if (isNaN(v)) return "";
    const y = v.getFullYear();
    if (y < 1950 || y > 2100) return "";
    return v.toISOString().slice(0, 10);
  }
  if (typeof v === "number") {
    if (v <= 0) return "";
    // Si es un año (ej: 2018), devolverlo directamente
    if (Number.isInteger(v) && v >= 1950 && v <= 2100) return `${v}-01-01`;
    const d = new Date(Math.round((v - 25569) * 86400 * 1000));
    if (isNaN(d)) return "";
    const y = d.getFullYear();
    if (y < 1950 || y > 2100) return "";
    return d.toISOString().slice(0, 10);
  }
  const s = String(v).trim();
  const m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if (m) {
    const y = parseInt(m[3]);
    if (y < 1950 || y > 2100) return "";
    return `${m[3]}-${m[2].padStart(2, "0")}-${m[1].padStart(2, "0")}`;
  }
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
    const y = parseInt(s.slice(0, 4));
    if (y < 1950 || y > 2100) return "";
    return s.slice(0, 10);
  }
  return "";
};
const parseNivel = v => {
  const m = String(v || "").trim().match(/^(V\d(?:\.\d)?|R)\b/i);
  return m ? m[1].toUpperCase() : "";
};
function parseEmployeesExcel(ab) {
  const wb = XLSX.read(new Uint8Array(ab), {
    type: "array",
    cellDates: true
  });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, {
    header: 1,
    defval: ""
  });
  const emps = [];
  const headers = rows[0].map(h => String(h || "").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""));
  const findH = (...keys) => {
    const i = headers.findIndex(h => keys.some(k => h.includes(k)));
    return i >= 0 ? i : -1;
  };
  // Encuentra TODOS los índices de columnas de módulo (puede haber Módulo 1, Módulo 2, Módulo 3...)
  const moduleIdxs = headers.reduce((acc, h, i) => {
    if (h.includes("modulo") || h.includes("mod ")) acc.push(i);
    return acc;
  }, []);
  const idx = {
    nivel: findH("nivel"),
    sector: findH("sector"),
    skill: findH("skill"),
    location: findH("ubicacion", "ubicacion", "location"),
    antiguedad: findH("antiguedad", "antiguedad", "incorpora", "fecha inc"),
    expSap: findH("experiencia", "exp sap", "exp. sap")
  };
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r[0]) continue;
    const nombre = String(r[0] || "").trim();
    if (!nombre) continue;
    const modules = moduleIdxs.map(mi => String(r[mi] || "").trim()).filter(Boolean);
    const emp = {
      id: "emp-" + Date.now() + Math.random(),
      nombre,
      nivel: parseNivel(idx.nivel >= 0 ? r[idx.nivel] : ""),
      modules,
      module: modules[0] || "",
      sector: idx.sector >= 0 ? String(r[idx.sector] || "").trim() : "",
      skill: idx.skill >= 0 ? String(r[idx.skill] || "").trim() : "",
      location: idx.location >= 0 ? String(r[idx.location] || "").trim() : "",
      antiguedad: idx.antiguedad >= 0 ? excelDateToISO(r[idx.antiguedad]) : "",
      expSap: idx.expSap >= 0 ? excelDateToISO(r[idx.expSap]) : ""
    };
    emps.push(emp);
  }
  return emps;
}

<script>
  const _auth = firebase.auth();

  const INACTIVITY_TIMEOUT = 15 * 60 * 1000;
  let lastActivity = Date.now();
  let authCheckInterval = null;

  function resetInactivity() { lastActivity = Date.now(); }
  document.addEventListener('mousemove', resetInactivity);
  document.addEventListener('keydown', resetInactivity);
  document.addEventListener('click', resetInactivity);

  function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const pass = document.getElementById('login-pass').value;
    const errEl = document.getElementById('login-error');
    errEl.textContent = '';
    _auth.signInWithEmailAndPassword(email, pass)
      .catch(() => { errEl.textContent = 'Credenciales incorrectas'; });
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));

  _auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('root').style.display = 'block';
      root.render(React.createElement(App, null));
      authCheckInterval = setInterval(() => {
        if (Date.now() - lastActivity > INACTIVITY_TIMEOUT) { _auth.signOut(); }
      }, 60000);
    } else {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('root').style.display = 'none';
      if (authCheckInterval) { clearInterval(authCheckInterval); authCheckInterval = null; }
    }
  });

  window.doLogout = function() { _auth.signOut(); };
  window._db = _db;
  window._auth = _auth;

</script>
