const resizePhoto = (file, maxDim = 160, quality = 0.85) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      let w = img.width,
        h = img.height;
      if (w > h) {
        if (w > maxDim) {
          h = Math.round(h * maxDim / w);
          w = maxDim;
        }
      } else {
        if (h > maxDim) {
          w = Math.round(w * maxDim / h);
          h = maxDim;
        }
      }
      const canvas = document.createElement("canvas");
      canvas.width = w;
      canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL("image/jpeg", quality));
    };
    img.onerror = () => reject(new Error("No se pudo leer la imagen"));
    img.src = e.target.result;
  };
  reader.onerror = () => reject(new Error("No se pudo leer el archivo"));
  reader.readAsDataURL(file);
});

const parseVal = v => {
  if (typeof v === "number" && v >= 1 && v <= 8) return Math.round(v);
  if (typeof v === "string") {
    const t = v.trim();
    if (VMAP[t]) return VMAP[t];
    const n = parseFloat(t);
    if (!isNaN(n) && n >= 1 && n <= 8) return Math.round(n);
  }
  return 4;
};
function parseExcelModule(ab, fileName) {
  const wb = XLSX.read(new Uint8Array(ab), {
    type: "array"
  });
  const sn = wb.SheetNames.find(n => /matriz|conocimiento/i.test(n)) || wb.SheetNames[0];
  const rows = XLSX.utils.sheet_to_json(wb.Sheets[sn], {
    header: 1,
    defval: ""
  });
  const items = [];
  let uid = Date.now();
  for (const row of rows) {
    const peso = parseFloat(row[0]);
    if (!peso || peso <= 0 || isNaN(peso)) continue;
    const desc = String(row[1] || "").trim(),
      ambito = String(row[2] || "").trim();
    if (!desc || !ambito || desc.length < 4) continue;
    if (/^(valoraci|desviaci|nivel)/i.test(desc)) continue;
    items.push({
      id: uid++,
      peso,
      desc,
      ambito,
      v1: parseVal(row[3]),
      v2: parseVal(row[4])
    });
  }
  const name = sn.replace(/conocimiento[\s_]*/i, "").replace(/[\s_]*matriz[\s_]*/i, " ").replace(/[\s_]+/g, " ").trim() || fileName.replace(/\.(xlsx?|xls)$/i, "");
  return {
    id: "mod-" + Date.now(),
    name: name || "Módulo importado",
    items,
    ambitoOrder: [...new Set(items.map(i => i.ambito))]
  };
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    let authCheckInterval = null;
    let lastActivity = Date.now();
    const INACTIVITY_TIMEOUT = 15 * 60 * 1000;

    const resetInactivityTimer = () => {
      lastActivity = Date.now();
    };
    window.addEventListener('click', resetInactivityTimer);
    window.addEventListener('keydown', resetInactivityTimer);

    const _auth = firebase.auth();
    window.doLogout = () => _auth.signOut();

    firebase.firestore().settings({ ignoreUndefinedProperties: true });
    window.storage = {
      get: async (key, shared = false) => {
        try {
          const docId = shared ? 'shared_' + key : 'user_' + key;
          const docSnap = await firebase.firestore().collection('storage').doc(docId).get();
          if (docSnap.exists) return { key, value: docSnap.data().value, shared };
        } catch (e) {}
        const stored = localStorage.getItem(key);
        if (stored) return { key, value: stored, shared: false };
        throw new Error('Not found');
      },
      set: async (key, value, shared = false) => {
        try {
          const docId = shared ? 'shared_' + key : 'user_' + key;
          await firebase.firestore().collection('storage').doc(docId).set({ value, ts: new Date() });
        } catch (e) {}
        localStorage.setItem(key, value);
        return { key, value, shared };
      },
      delete: async (key, shared = false) => {
        try {
          const docId = shared ? 'shared_' + key : 'user_' + key;
          await firebase.firestore().collection('storage').doc(docId).delete();
        } catch (e) {}
        localStorage.removeItem(key);
        return { key, deleted: true, shared };
      },
      list: async (prefix = '', shared = false) => {
        const keys = [];
        try {
          const snapshot = await firebase.firestore().collection('storage').get();
          snapshot.forEach(doc => {
            if (prefix && !doc.id.includes(prefix)) return;
            if (shared && !doc.id.startsWith('shared_')) return;
            if (!shared && !doc.id.startsWith('user_')) return;
            keys.push(doc.id.replace(/^(user_|shared_)/, ''));
          });
        } catch (e) {}
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (prefix && !k.includes(prefix)) continue;
          if (!keys.includes(k)) keys.push(k);
        }
        return { keys, prefix, shared };
      }
    };

    _auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('root').style.display = 'block';
        root.render(React.createElement(App, null));
        authCheckInterval = setInterval(() => {
          if (Date.now() - lastActivity > INACTIVITY_TIMEOUT) {
            _auth.signOut();
          }
        }, 60000);
      } else {
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('root').style.display = 'none';
        if (authCheckInterval) clearInterval(authCheckInterval);
      }
    });

    const doLogin = () => {
      const email = document.getElementById('login-email').value.trim();
      const pass = document.getElementById('login-pass').value.trim();
      const err = document.getElementById('login-error');
      if (!email || !pass) { err.textContent = 'Email y contraseña requeridos'; return; }
      err.textContent = 'Iniciando sesión…';
      _auth.signInWithEmailAndPassword(email, pass)
        .then(() => { err.textContent = ''; })
        .catch(e => {
          const msg = e.code === 'auth/user-not-found' ? 'Usuario no encontrado' :
            e.code === 'auth/wrong-password' ? 'Contraseña incorrecta' :
            e.code === 'auth/invalid-email' ? 'Email inválido' : e.message;
          err.textContent = msg;
        });
    };
