    const _db  = firebase.firestore();
    const _auth = firebase.auth();
    const _localPhotos = {};

    window.storage = {
      set: (k,v,shared=false) => new Promise((res,rej) => {
        if(shared){ _db.collection("shared-data").doc(k).set({value:v}).then(()=>res({key:k,value:v,shared:true})).catch(rej); }
        else { try{localStorage.setItem(k,v);res({key:k,value:v});}catch(e){rej(e);} }
      }),
      get: (k,shared=false) => new Promise((res,rej) => {
        if(shared){ _db.collection("shared-data").doc(k).get().then(d=>res(d.exists?{key:k,value:d.data().value,shared:true}:null)).catch(rej); }
        else { try{const v=localStorage.getItem(k);res(v?{key:k,value:v}:null);}catch(e){rej(e);} }
      }),
      delete: (k,shared=false) => new Promise((res,rej) => {
        if(shared){ _db.collection("shared-data").doc(k).delete().then(()=>res({key:k,deleted:true})).catch(rej); }
        else { try{localStorage.removeItem(k);res({key:k,deleted:true});}catch(e){rej(e);} }
      }),
      list: (prefix,shared=false) => new Promise((res,rej) => {
        if(shared){ _db.collection("shared-data").where(firebase.firestore.FieldPath.documentId(),">=",prefix).where(firebase.firestore.FieldPath.documentId(),"<",prefix+"~").get().then(qs=>res({keys:qs.docs.map(d=>d.id)})).catch(rej); }
        else { try{res({keys:Object.keys(localStorage).filter(k=>k.startsWith(prefix))});}catch(e){rej(e);} }
      }),
      restorePhotos: (emps) => { emps.forEach(e=>{if(_localPhotos[e.id])e.foto=_localPhotos[e.id];}); return emps; }
    };

    // Inactividad 15 min → logout
    let _inactivityTimer;
    function resetInactivity(){
      clearTimeout(_inactivityTimer);
      _inactivityTimer = setTimeout(()=>_auth.signOut(), 15*60*1000);
    }
    ['click','keydown','mousemove','touchstart'].forEach(ev=>document.addEventListener(ev,resetInactivity,{passive:true}));

    function doLogin(){
      const email=document.getElementById('login-email').value.trim();
      const pass=document.getElementById('login-pass').value;
      const errEl=document.getElementById('login-error');
      const btn=document.querySelector('#login-screen button');
      errEl.textContent=''; btn.disabled=true; btn.textContent='Entrando…';
      _auth.signInWithEmailAndPassword(email,pass)
        .then(()=>{btn.disabled=false;btn.textContent='Entrar';})
        .catch(err=>{
          btn.disabled=false; btn.textContent='Entrar';
          errEl.textContent=(err.code==='auth/wrong-password'||err.code==='auth/user-not-found')
            ?'Email o contraseña incorrectos':'Error: '+err.message;
        });
    }
    window.doLogout = ()=>_auth.signOut();

    let _appMounted=false;
    let _authResolve;
    window._authReady=new Promise(r=>{_authResolve=r;});

    _auth.onAuthStateChanged(user=>{
      const loginEl=document.getElementById('login-screen');
      const rootEl=document.getElementById('root');
      if(user){
        loginEl.style.display='none';
        rootEl.style.display='';
        _authResolve();
        resetInactivity();
        if(!_appMounted){

          const root=ReactDOM.createRoot(rootEl);
          root.render(React.createElement(App));
        }
      } else {
        loginEl.style.display='flex';
        rootEl.style.display='none';
        window._authReady=new Promise(r=>{_authResolve=r;});
      }
    });

const fmtDate = iso => {

};
const calcAntiguedad = iso => {
  if (!iso) return "";
  const start = new Date(iso + "T00:00:00");
  if (isNaN(start.getTime())) return "";
  const now = new Date();
  let years = now.getFullYear() - start.getFullYear();
  let months = now.getMonth() - start.getMonth();
  if (now.getDate() < start.getDate()) months--;
  if (months < 0) {
    years--;
    months += 12;
  }
  if (years < 0) return "";
  if (years >= 1) return `${years} año${years !== 1 ? "s" : ""}`;
  if (months >= 1) return `${months} mes${months !== 1 ? "es" : ""}`;
  return "Menos de 1 mes";
};
const resizePhoto = (file, maxDim = 160, quality = 0.85) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      let w = img.width,
        h = img.height;
      if (w > h) {
        if (w > maxDim) {
          h = Math.round(h * maxDim / w);
          w = maxDim;
        }
      } else {
        if (h > maxDim) {
          w = Math.round(w * maxDim / h);
          h = maxDim;
        }
      }
      const canvas = document.createElement("canvas");
      canvas.width = w;
      canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL("image/jpeg", quality));
    };
    img.onerror = () => reject(new Error("No se pudo leer la imagen"));
    img.src = e.target.result;
  };
  reader.onerror = () => reject(new Error("No se pudo leer el archivo"));
  reader.readAsDataURL(file);
});

const parseVal = v => {
  if (typeof v === "number" && v >= 1 && v <= 8) return Math.round(v);
  if (typeof v === "string") {
    const t = v.trim();
    if (VMAP[t]) return VMAP[t];
    const n = parseFloat(t);
    if (!isNaN(n) && n >= 1 && n <= 8) return Math.round(n);
  }
  return 4;
};
function parseExcelModule(ab, fileName) {
  const wb = XLSX.read(new Uint8Array(ab), {
    type: "array"
  });
  const sn = wb.SheetNames.find(n => /matriz|conocimiento/i.test(n)) || wb.SheetNames[0];
  const rows = XLSX.utils.sheet_to_json(wb.Sheets[sn], {
    header: 1,
    defval: ""
  });
  const items = [];
  let uid = Date.now();
  for (const row of rows) {
    const peso = parseFloat(row[0]);
    if (!peso || peso <= 0 || isNaN(peso)) continue;
    const desc = String(row[1] || "").trim(),
      ambito = String(row[2] || "").trim();
    if (!desc || !ambito || desc.length < 4) continue;
    if (/^(valoraci|desviaci|nivel)/i.test(desc)) continue;
    items.push({
      id: uid++,
      peso,
      desc,
      ambito,
      v1: parseVal(row[3]),
      v2: parseVal(row[4])
    });
  }
  const name = sn.replace(/conocimiento[\s_]*/i, "").replace(/[\s_]*matriz[\s_]*/i, " ").replace(/[\s_]+/g, " ").trim() || fileName.replace(/\.(xlsx?|xls)$/i, "");
  return {
    id: "mod-" + Date.now(),
    name: name || "Módulo importado",
    items,
    ambitoOrder: [...new Set(items.map(i => i.ambito))]
  };
}
