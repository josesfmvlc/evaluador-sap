const resizePhoto = (file, maxDim = 160, quality = 0.85) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      let w = img.width,
        h = img.height;
      if (w > h) {
        if (w > maxDim) {
          h = Math.round(h * maxDim / w);
          w = maxDim;
        }
      } else {
        if (h > maxDim) {
          w = Math.round(w * maxDim / h);
          h = maxDim;
        }
      }
      const canvas = document.createElement("canvas");
      canvas.width = w;
      canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL("image/jpeg", quality));
    };
    img.onerror = () => reject(new Error("No se pudo leer la imagen"));
    img.src = e.target.result;
  };
  reader.onerror = () => reject(new Error("No se pudo leer el archivo"));
  reader.readAsDataURL(file);
});

    let _auth=firebase.auth();
    const storage={
      get:async(key,shared)=>{try{const v=localStorage.getItem(key);return v?{key,value:v,shared}:null;}catch{return null;}},
      set:async(key,value,shared)=>{try{localStorage.setItem(key,value);return{key,value,shared};}catch{return null;}},
      delete:async(key,shared)=>{try{localStorage.removeItem(key);return{key,deleted:true,shared};}catch{return null;}},
      list:async(prefix,shared)=>{try{const keys=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(!prefix||k.startsWith(prefix))keys.push(k);}return{keys,prefix,shared};}catch{return null;}}
    };
    window.storage=storage;
    const root=ReactDOM.createRoot(document.getElementById("root"));
    const loginScreen=document.getElementById("login-screen");
    const rootEl=document.getElementById("root");
    let inactivityTimeout;
    function resetInactivityTimer(){clearTimeout(inactivityTimeout);inactivityTimeout=setTimeout(()=>_auth.signOut(),15*60*1000);}
    document.addEventListener("mousemove",resetInactivityTimer);
    document.addEventListener("keypress",resetInactivityTimer);
    window.doLogout=()=>_auth.signOut();
    function doLogin(){const email=document.getElementById("login-email").value;const pass=document.getElementById("login-pass").value;const err=document.getElementById("login-error");if(!email||!pass){err.textContent="Por favor rellena los campos";return;}err.textContent="";_auth.signInWithEmailAndPassword(email,pass).then(u=>{loginScreen.style.display="none";rootEl.style.display="block";root.render(React.createElement(App));resetInactivityTimer();}).catch(e=>{console.error("Login error:",e);err.textContent=e.message.replace(/Firebase: /,"");});}
    _auth.onAuthStateChanged(user=>{if(user){loginScreen.style.display="none";rootEl.style.display="block";root.render(React.createElement(App));resetInactivityTimer();}else{loginScreen.style.display="flex";rootEl.style.display="none";}});
